<!DOCTYPE html>
<html>

<head>
    <title>Placement Prediction System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container text-center mt-5">

        <h1>🎓 Placement Prediction System</h1>
        <p class="text-muted">This ML model predicts placement chances based on CGPA and IQ.</p>

        <div class="mt-4">
            <input class="form-control w-25 mx-auto mb-3" type="number" id="cgpa" placeholder="Enter CGPA (0-10)">

            <input class="form-control w-25 mx-auto mb-3" type="number" id="iq" placeholder="Enter IQ (50-200)">

            <button class="btn btn-primary" onclick="predict()">Predict</button>
        </div>

        <h2 class="mt-4" id="result"></h2>

    </div>

    <script>
        function predict() {
            const data = {
                cgpa: document.getElementById("cgpa").value,
                iq: document.getElementById("iq").value
            };

            fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById("result").innerText = data.error;
                    } else {
                        let text = data.result === 1 ? "Placed ✅" : "Not Placed ❌";

                        // FIXED CONFIDENCE (no fake 100%)
                        let conf = Math.min(data.confidence, 95);

                        text += " (Confidence: " + conf + "%)";
                        document.getElementById("result").innerText = text;
                    }
                });
        }
    </script>

</body>

</html>
